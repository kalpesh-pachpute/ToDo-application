name: Docker CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.kalpesh72 }}
          password: ${{ secrets.kalpesh123@45 }}

      - name: Build Docker image
        run: docker build -t kalpeshpachpute/todo-application ./app

      - name: Push Docker image
        run: docker push kalpeshpachpute/todo-application